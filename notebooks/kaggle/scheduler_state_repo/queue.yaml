    moveset: strict-ac
    max_relator_tokens: 48
    seed: 0
    dataset:
      bucket: HkHk2Prod/alphaac-data
      max_difficulty: null
    training:
      reward_mode: navigation
      gamma: 0.99
      iterations: 100000000
      episodes_per_iteration: 32
      batch_size: 64
      ppo_epochs: 4
      ppo_lambda: 0.95
      ppo_clip: 0.2
