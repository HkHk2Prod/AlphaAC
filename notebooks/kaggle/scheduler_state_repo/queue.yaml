      # rewrites the run's whole metrics history -- so one per iteration is pure waste,
      # while 0 (never) would push nothing at all. 25 keeps the uploader fed with a fresh
      # bundle while writing 25x less.
      checkpoint_every: 25
      workers: 0
- id: train-ppo-strict-navigation-transformer
