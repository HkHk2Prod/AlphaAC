version: 1
limits:
  max_total_active: 5
  max_cpu_active: 5
  max_gpu_active: 1
  max_launches_per_tick: 5
  stale_heartbeat_minutes: 180
tasks:
# Closest-first generation: expands outward from the trivial group by the inverses of the
# strict-ac moves, breadth-first, so every distance it writes is a proven optimum and each
# shell is complete before the next begins. It emits the annotation file itself, which is
# why no annotation task follows it. Resumes from the bucket: the groups file is the queue.
#
# `max_relator_length` must equal the `max_relator_tokens` of the training tasks below.
# It is what makes this ball *their* graph: a move that would outgrow it is one their
# environment masks, so the distances proven here are shortest paths through the moves
# those models may actually play. A training run pointed at a ball grown under any other
# bound is refused, and the bound is in the filename (`ball_rank2_rel48.groups.json`), so
# the two tasks meet on the same object in the bucket.
- id: ball-main
  mode: ball
  notebook_slug: hkhk2prod/alphaac-ball
  notebook_dir: notebooks/kaggle
  active: false
  remaining_runs: null
  accelerator: cpu
  priority: 100
  max_runtime_minutes: 600
  stop_after_current_iteration: false
  config:
    rank: 2
    moveset: strict-ac
    max_relator_length: 48
    target: 100000000
    # Every N hours the run rewrites both documents (in place, no atomic temp) and pushes
    # them to the bucket. That push is the session's only durable output -- the container
    # dies with the session -- so this is how much expansion an interruption may cost. No
    # `output` key: the notebook stages the ball on /kaggle/tmp (60 GB) by default, which
    # a pinned /kaggle/working path (20 GB) would defeat.
    checkpoint_hours: 0.5
    workers: 0
# The length-first grow and the annotation pass that gave it distances. Retired in favour
# of `ball-main`: its distances were only ever upper bounds (a shortest path can run
# through a group it never expanded) and under strict-ac only 59% of its groups could
# reach the origin at all. Left here, inactive, because the grown dataset is still what
# the universal move set and the descent labels are built from.
- id: generation-main
  mode: generation
  notebook_slug: hkhk2prod/alphaac-generation
  notebook_dir: notebooks/kaggle
  active: false
  remaining_runs: null
  accelerator: cpu
  priority: 100
  max_runtime_minutes: 600
  stop_after_current_iteration: false
  config:
    rank: 2
    target: 100000000
    max_relator_length: 0
    workers: 0
    output: /kaggle/working/train_rank2.groups.json
- id: annotation-main
  mode: annotation
  notebook_slug: hkhk2prod/alphaac-annotation
  notebook_dir: notebooks/kaggle
  active: false
  remaining_runs: null
  accelerator: cpu
  priority: 90
  max_runtime_minutes: 600
  stop_after_current_iteration: false
  config:
    moveset: strict-ac
    max_depth: 0
    workers: 0
# Pretraining ablation: four models (alphazero/ppo x residual_mlp/transformer), each run as
# TWO twin tasks -- one seeded from the supervised-pretrained checkpoint, one trained from
# zero -- so the pair isolates pretraining's impact. The twins' configs are identical in
# every field the checkpoint name reads, so each sets a `checkpoint_name_suffix`
# (`pretrained` / `scratch`) to split them into separate lineages on the bucket; the suffix
# lands before the identity hash, so both still fork together if a task-defining field
# changes. All eight share
# priority 50, so with `max_total_active: 5` the scheduler's oldest-launch-first ordering
# rotates them fairly through the five Kaggle slots (three always wait, taking a freed slot
# the moment a run finishes).
- id: train-alphazero-strict-navigation-pretrained
  mode: training
  notebook_slug: hkhk2prod/alphaac-train-alphazero
  notebook_dir: notebooks/kaggle
  active: true
  remaining_runs: null
  accelerator: cpu
  priority: 50
  max_runtime_minutes: 600
  stop_after_current_iteration: false
  config:
    rank: 2
    agent: alphazero
    model: residual_mlp
    # Matches the residual_mlp `supervised_rel48_pretrain_mlp.yaml` so its pretrained
    # weights load on this task's first run (see `training.pretrained_checkpoint`).
    model_config:
      embed_dim: 64
      hidden_dim: 256
    moveset: strict-ac
    max_relator_tokens: 48
    seed: 0
    dataset:
      bucket: HkHk2Prod/alphaac-data
      max_difficulty: null
    training:
      reward_mode: navigation
      gamma: 0.99
      iterations: 100000000
      episodes_per_iteration: 24
      optimizer_updates: 8
      batch_size: 64
      replay_capacity: 4096
      learning_rate: 0.02
      value_loss_weight: 1.0
      mcts_simulations: 128
      c_puct: 1.5
      # Iterations between checkpoints. Not a disk-write knob: the checkpoint event is
      # what the 4-hourly HF push and the self-play showcase hang off, and each save
      # rewrites the run's whole metrics history -- so one per iteration is pure waste,
      # while 0 (never) would push nothing at all. 25 keeps the uploader fed with a fresh
      # bundle while writing 25x less.
      checkpoint_every: 25
      # First run seeds from this supervised-pretrained model on HF; every later run
      # resumes this task's own RL checkpoint instead (it wins once it exists).
      pretrained_checkpoint: pretrained-rank2-residual_mlp-rel48
      # Names this arm's lineage `...-pretrained-<hash>`, symmetric with its `-scratch`
      # twin. A suffix (not a pinned `checkpoint_name`) so both arms keep the identity
      # hash and fork together if a task-defining field changes.
      checkpoint_name_suffix: pretrained
      workers: 0
- id: train-alphazero-strict-navigation-scratch
  mode: training
  notebook_slug: hkhk2prod/alphaac-train-alphazero-scratch
  notebook_dir: notebooks/kaggle
  active: true
  remaining_runs: null
  accelerator: cpu
  priority: 50
  max_runtime_minutes: 600
  stop_after_current_iteration: false
  config:
    rank: 2
    agent: alphazero
    model: residual_mlp
    model_config:
      embed_dim: 64
      hidden_dim: 256
    moveset: strict-ac
    max_relator_tokens: 48
    seed: 0
    dataset:
      bucket: HkHk2Prod/alphaac-data
      max_difficulty: null
    training:
      reward_mode: navigation
      gamma: 0.99
      iterations: 100000000
      episodes_per_iteration: 24
      optimizer_updates: 8
      batch_size: 64
      replay_capacity: 4096
      learning_rate: 0.02
      value_loss_weight: 1.0
      mcts_simulations: 128
      c_puct: 1.5
      checkpoint_every: 25
      # From-zero twin of `train-alphazero-strict-navigation-pretrained`: identical
      # config, no `pretrained_checkpoint`, and its own lineage so it never inherits the
      # pretrained run's checkpoints. The pair measures pretraining's impact.
      checkpoint_name_suffix: scratch
      workers: 0
- id: train-ppo-strict-navigation-pretrained
  mode: training
  notebook_slug: hkhk2prod/alphaac-train-ppo
  notebook_dir: notebooks/kaggle
  active: true
  remaining_runs: null
  accelerator: cpu
  priority: 50
  max_runtime_minutes: 600
  stop_after_current_iteration: false
  config:
    rank: 2
    agent: ppo
    model: residual_mlp
    # Matches the residual_mlp `supervised_rel48_pretrain_mlp.yaml` (see below).
    model_config:
      embed_dim: 64
      hidden_dim: 256
    moveset: strict-ac
    max_relator_tokens: 48
    seed: 0
    dataset:
      bucket: HkHk2Prod/alphaac-data
      max_difficulty: null
    training:
      reward_mode: navigation
      gamma: 0.99
      iterations: 100000000
      episodes_per_iteration: 32
      batch_size: 64
      ppo_epochs: 4
      ppo_lambda: 0.95
      ppo_clip: 0.2
      entropy_coef: 0.01
      value_loss_weight: 0.5
      learning_rate: 0.02
      # See `checkpoint_every` on the alphazero task above: the event feeds the 4-hourly
      # push, so it must fire -- just not every iteration.
      checkpoint_every: 25
      # First run seeds from this supervised-pretrained model on HF; every later run
      # resumes this task's own RL checkpoint instead (it wins once it exists).
      pretrained_checkpoint: pretrained-rank2-residual_mlp-rel48
      # See the alphazero/residual_mlp pretrained task: suffix, not a pinned name.
      checkpoint_name_suffix: pretrained
      workers: 0
