# Heavy / "serious" RL run. ~73 s/iteration on a single CPU core (24 episodes x
# 256 PUCT simulations, depth-6 instances), so ~2 hours for 100 iterations on one
# core. `training.workers: 0` fans the 24 self-play episodes across every CPU core,
# cutting wall-clock by roughly the core count (set a positive number to cap it).
# Episodes are reassembled in order, so the trained model is identical regardless
# of the worker count. Wall-clock otherwise scales ~linearly with iterations x
# episodes_per_iteration x mcts_simulations. Peak memory is ~50 MB per worker;
# checkpoints are written every 5 iterations so a long run is resumable.
#
# Reward is `navigation`: adaptive distance-shaping toward the trivial group, so
# the run seeds self-play from the grown dataset and its `strict-ac` annotations.
# Leaving dataset.path unset lets `aczero train` pull the group dataset + its
# annotations from the online HF bucket into data/generated/ by default (needed
# for the navigation reward's start-to-goal distance and the distance curriculum).
rank: 2
agent: alphazero
model: residual_mlp
total_length_cap: 128
moveset: strict-ac
dataset:
  count: 8
  depth: 6
training:
  reward_mode: navigation
  iterations: 1000000
  episodes_per_iteration: 24
  optimizer_updates: 32
  batch_size: 32
  replay_capacity: 8192
  learning_rate: 0.01
  value_loss_weight: 1.0
  mcts_simulations: 256
  c_puct: 1.5
  checkpoint_every: 5
  workers: 0
  run_directory: runs/train/alphazero_rank2_heavy
