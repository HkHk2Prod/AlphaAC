# A ~99M-parameter transformer trained directly on the dataset's descent labels, to be
# used as the solver rather than as an RL warm start.
#
# Sizing (rank 2, 12 strict-AC actions): 14 blocks of d=768 / ff=3072 / 12 heads is
# 99.2M parameters. The run logs the exact count under the `model` event.
#
# This wants a GPU. `device: auto` takes one when the machine has it (Kaggle) and falls
# back to the CPU otherwise, where it will be slow but correct.
rank: 2
agent: supervised
model: transformer
moveset: strict-ac
# The ball is grown with no length cap, so its longest relator is not a capacity worth
# sizing to: a handful of groups reach far past the rest, and deriving the capacity from
# them (`0`) would pay attention over a mostly-padded window for every batch. Cap it, and
# the groups that do not fit are dropped from training rather than truncated.
max_relator_tokens: 48
model_config:
  embed_dim: 768
  ff_dim: 3072
  num_layers: 14
  num_heads: 12
dataset:
  path: data/generated/ball_rank2.groups.json
  annotations: data/generated/ball_rank2.strict-ac.annotations.json
  split: data/generated/ball_rank2.split.json
training:
  device: auto
  iterations: 200           # epochs
  optimizer_updates: 500    # minibatches per epoch
  batch_size: 256
  learning_rate: 0.0003
  value_loss_weight: 0.5
  gamma: 0.99               # sets the value target: 2 * gamma**distance - 1
  target_temperature: 1.0
  grad_clip: 1.0
  eval_batches: 32
  checkpoint_every: 1
  run_directory: runs/train/supervised_large
