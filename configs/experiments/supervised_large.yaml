# A ~99M-parameter transformer trained directly on the dataset's descent labels, to be
# used as the solver rather than as an RL warm start.
#
# Sizing (rank 2, 12 strict-AC actions): 14 blocks of d=768 / ff=3072 / 12 heads is
# 99.2M parameters. The run logs the exact count under the `model` event.
#
# This wants a GPU. `device: auto` takes one when the machine has it (Kaggle) and falls
# back to the CPU otherwise, where it will be slow but correct.
rank: 2
agent: supervised
model: transformer
moveset: strict-ac
# The relator bound: the longest relator a group may carry. It is the encoder's grid
# width, the length bound the environment masks moves by, and the bound the dataset was
# grown under -- one number, because they have to be the same number. The run is refused
# on a dataset generated under any other.
max_relator_tokens: 48
model_config:
  embed_dim: 768
  ff_dim: 3072
  num_layers: 14
  num_heads: 12
  # Recompute each block's activations in the backward pass instead of holding all 14
  # blocks' intermediates at once. At batch_size 256 the stored activations otherwise
  # dwarf the ~16 GB of a Kaggle GPU; checkpointing trades a ~25% slower step for fitting
  # the real batch size. Costs nothing at inference (gated on the backward graph).
  grad_checkpoint: true
dataset:
  path: data/generated/ball_rank2_rel48.groups.json
  annotations: data/generated/ball_rank2_rel48.strict-ac.annotations.json
  split: data/generated/ball_rank2_rel48.split.json
training:
  device: auto
  iterations: 200           # epochs
  optimizer_updates: 500    # minibatches per epoch
  batch_size: 256
  learning_rate: 0.0003
  value_loss_weight: 0.5
  gamma: 0.99               # sets the value target: 2 * gamma**distance - 1
  target_temperature: 1.0
  grad_clip: 1.0
  eval_batches: 32
  checkpoint_every: 1
  run_directory: runs/train/supervised_large
