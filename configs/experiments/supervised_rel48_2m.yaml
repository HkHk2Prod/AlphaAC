# A ~2.2M-parameter transformer on the dataset's descent labels -- the step up from
# supervised_rel48_pretrain.yaml (0.8M) when that model underfits but a GPU-sized run is not
# yet warranted. Trains at a usable speed on a CPU.
#
# Sizing (rank 2, 12 strict-AC actions): 5 blocks of d=192 / ff=768 / 6 heads is 2.23M
# parameters. The run logs the exact count under the `model` event.
rank: 2
agent: supervised
model: transformer
moveset: strict-ac
# The relator bound: the longest relator a group may carry. It is the encoder's grid
# width, the length bound the environment masks moves by, and the bound the dataset was
# grown under -- one number, because they have to be the same number. The run is refused
# on a dataset generated under any other.
max_relator_tokens: 48
model_config:
  embed_dim: 192
  ff_dim: 768
  num_layers: 5
  num_heads: 6
dataset:
  path: data/generated/ball_rank2_rel48.groups.json
  annotations: data/generated/ball_rank2_rel48.strict-ac.annotations.json
  split: data/generated/ball_rank2_rel48.split.json
training:
  device: auto
  iterations: 100           # epochs
  optimizer_updates: 300    # minibatches per epoch
  batch_size: 128
  learning_rate: 0.0007
  value_loss_weight: 0.5
  gamma: 0.99               # sets the value target: 2 * gamma**distance - 1
  target_temperature: 1.0
  grad_clip: 1.0
  eval_batches: 20
  checkpoint_every: 1
  run_directory: runs/train/supervised_rel48_2m
